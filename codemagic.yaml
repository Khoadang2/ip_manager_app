workflows:
  ios-unsigned:
    name: iOS unsigned IPA (Flutter)
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: Clean & Get Packages
        script: |
          flutter clean
          flutter pub get

      - name: Build iOS (no codesign)
        script: |
          flutter build ios --release --no-codesign

      - name: Create unsigned IPA artifact
        script: |
          mkdir -p $CM_ARTIFACTS_DIR

          # Check path of Runner.app (Codemagic sometimes changes output dir)
          if [ -d "build/ios/iphoneos/Runner.app" ]; then
            APP_PATH="build/ios/iphoneos/Runner.app"
          elif [ -d "build/ios/Release-iphoneos/Runner.app" ]; then
            APP_PATH="build/ios/Release-iphoneos/Runner.app"
          else
            echo "❌ Runner.app not found!"
            ls -R build/ios || true
            exit 1
          fi

          # Create Payload and zip into IPA
          rm -rf Payload && mkdir Payload
          cp -R "$APP_PATH" Payload/
          zip -r app_unsigned.ipa Payload
          mv app_unsigned.ipa $CM_ARTIFACTS_DIR/

    artifacts:
      - $CM_ARTIFACTS_DIR/*.ipa
