workflows:
  ios_unsigned_ipa:
    name: iOS Unsigned IPA (Flutter)
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        API_BASE_URL: "http://192.168.71.9:5501"
    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - ~/.pub-cache
        - ios/Pods
        - ~/Library/Caches/CocoaPods

    scripts:
      - name: Flutter clean & get
        script: |
          flutter --version
          flutter clean
          flutter pub get

      - name: Ensure iOS platform 12.0
        script: |
          if [ -f "ios/Podfile" ]; then
            sed -i '' 's/platform :ios, .*/platform :ios, '\''12.0'\''/g' ios/Podfile || true
          fi

      - name: Build iOS (no codesign)
        script: |
          flutter build ios --release --no-codesign --dart-define=API_BASE_URL=$API_BASE_URL

      - name: Create unsigned IPA artifact
        script: |
          mkdir -p build/ios/ipa/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r app_unsigned.ipa Payload
          mv app_unsigned.ipa $CM_BUILD_DIR/app_unsigned.ipa

    artifacts:
      - $CM_BUILD_DIR/*.ipa

  ios_signed_ipa:
    name: iOS Signed IPA (Flutter)
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        API_BASE_URL: "http://192.168.71.9:5501"
      groups:
        - apple_credentials   # Khai báo ở Codemagic UI
        - certificate_credentials
    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - ~/.pub-cache
        - ios/Pods
        - ~/Library/Caches/CocoaPods

    scripts:
      - name: Flutter clean & get
        script: |
          flutter clean
          flutter pub get

      - name: Build iOS signed IPA
        script: |
          flutter build ipa --release \
            --dart-define=API_BASE_URL=$API_BASE_URL \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
